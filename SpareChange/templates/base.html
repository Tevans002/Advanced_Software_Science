{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpareChange</title>
    <link rel="stylesheet" href="{% static 'styles/base.css' %}" />

        <!-- Theme toggle script (load early to prevent flash) -->
    <script>
      // Load saved theme immediately
      const savedTheme = localStorage.getItem('sparechange_theme') || 'default';
      document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
  </head>

  <body>
    <nav>
      <a href="{% url 'home' %}" class="brand">Spare Change</a>
      <div class="links">
          <!-- Theme Toggle Button -->
        <button id="themeToggle" class="btn" style="padding: 8px 16px;">🎨 Theme</button>

        {% if user.is_authenticated %}
        <a href="{% url 'create_job' %}" class="logout-btn">Post a Job</a>
        <form action="{% url 'logout' %}" method="post" class="logout-form">
          {% csrf_token %}
          <button type="submit" class="logout-btn">Logout</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'signup' %}">Sign Up</a>
        {% endif %}
      </div>
    </nav>
    <div class="container">{% block content %} {% endblock content %}</div>

    <script>
    // Theme Manager using Strategy pattern
      const ThemeManager = {
        themes: ['default', 'pink', 'dark'],
        currentTheme: localStorage.getItem('sparechange_theme') || 'default',
        
        // Strategy: Apply theme
        applyTheme(themeName) {
          document.documentElement.setAttribute('data-theme', themeName);
          localStorage.setItem('sparechange_theme', themeName);
          this.currentTheme = themeName;
          this.updateButtonText();
        },
        
        // Strategy: Cycle to next theme
        nextTheme() {
          const currentIndex = this.themes.indexOf(this.currentTheme);
          const nextIndex = (currentIndex + 1) % this.themes.length;
          this.applyTheme(this.themes[nextIndex]);
        },
        
        updateButtonText() {
          const button = document.getElementById('themeToggle');
          if (button) {
            const themeNames = { default: '🌿 Green', pink: '🌸 Pink', dark: '🌙 Dark' };
            button.innerHTML = `${themeNames[this.currentTheme]}`;
          }
        },
        
        init() {
          this.applyTheme(this.currentTheme);
          const button = document.getElementById('themeToggle');
          if (button) {
            button.addEventListener('click', () => this.nextTheme());
          }
        }
      };

      // Initialize theme when page loads
      ThemeManager.init();
    </script>
  </body>
</html>
