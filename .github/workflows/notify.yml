name: Django CI with Discord Alerts

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' # Ajusta según la versión que uses

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Django Tests
        run: python SpareChange/manage.py test

      - name: ✅ Success Notification
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "content": "✅ **Tests Pasados** en `${{ github.repository }}`",
            "embeds": [{
              "title": "¡Todo salió bien!",
              "description": "El código en la rama **${{ github.ref_name }}** pasó todas las pruebas de Django.",
              "color": 3066993,
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: ❌ Failure Notification
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "content": "❌ **Fallo en Tests** en `${{ github.repository }}`",
            "embeds": [{
              "title": "Alerta de Error",
              "description": "Los tests de Django han fallado. Revisa los logs para corregirlo.",
              "color": 15158332,
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}
